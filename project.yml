name: LocalLens
options:
  bundleIdPrefix: com.laurent.locallens
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CLANG_ENABLE_MODULES: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  LocalLens:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - LocalLens
    info:
      path: LocalLens/Resources/Info.plist
      properties:
        CFBundleDisplayName: LocalLens
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "Copyright © 2026 Laurent"
    entitlements:
      path: LocalLens/Resources/LocalLens.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.network.client: true
    settings:
      base:
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.laurent.locallens
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - sdk: Security.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: Vision.framework
      - sdk: PDFKit.framework
      - sdk: AVFoundation.framework
      - sdk: QuickLookUI.framework
      - sdk: libsqlite3.tbd
  LocalLensTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - LocalLensTests
    dependencies:
      - target: LocalLens
    settings:
      base:
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.laurent.locallens.tests
        GENERATE_INFOPLIST_FILE: YES
  LocalLensUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - LocalLensUITests
    dependencies:
      - target: LocalLens
    settings:
      base:
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.laurent.locallens.uitests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  LocalLens:
    build:
      targets:
        LocalLens: all
        LocalLensTests: [test]
        LocalLensUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - LocalLensTests
        - LocalLensUITests
